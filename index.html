<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artificial Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="enterGate" class="gate">
      <button id="enterBtn" class="enter-btn" type="button">Tap to enter</button>
    </div>

    <button id="musicToggle" class="music-btn is-muted" type="button" aria-label="Mute or unmute">♫</button>

    <main class="stage">
      <h1>Artificial Intelligence</h1>
      <div id="coverWrap" class="cover-wrap">
        <img id="coverArt" class="cover-art" src="" alt="Current track cover" />
      </div>
      <p id="trackTitle" class="track-title">-</p>
    </main>

    <a
      class="spotify-cta"
      href="https://open.spotify.com/artist/0CA3Dup80CkKXT2LHSgilL"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open Arttellig on Spotify"
    >
      <span class="spotify-cta__content">
        <i class="bi bi-spotify"></i>
        <span>Spotify</span>
      </span>
    </a>

    <nav class="socials" aria-label="Social links">
      <a href="https://www.youtube.com/@Arttellig" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="bi bi-youtube"></i></a>
      <a href="https://www.instagram.com/arttellig" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
      <a href="https://www.tiktok.com/@arttellig" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="bi bi-tiktok"></i></a>
      <a href="https://www.facebook.com/61588603391861" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
      <a href="https://t.me/Arttellig" target="_blank" rel="noopener noreferrer" aria-label="Telegram"><i class="bi bi-telegram"></i></a>
    </nav>

    <audio id="bgAudio" preload="auto"></audio>

    <script>
      const playlist = [
        { title: "Cyberfade", audio: "tracks/cyberfade/track.mp3", cover: "tracks/cyberfade/cover.png" },
        { title: "Don't Go", audio: "tracks/don_t_go/track.mp3", cover: "tracks/don_t_go/cover.png" },
        { title: "Dramatic", audio: "tracks/dramatic/track.mp3", cover: "tracks/dramatic/cover.png" },
        {
          title: "Goodbye But I Love You",
          audio: "tracks/goodbye_but_i_love_you/track.mp3",
          cover: "tracks/goodbye_but_i_love_you/cover.png"
        },
        { title: "Hold Me", audio: "tracks/hold_me/track.mp3", cover: "tracks/hold_me/cover.png" },
        { title: "Unforgettable", audio: "tracks/unforgettable/track.mp3", cover: "tracks/unforgettable/cover.png" }
      ];

      const ui = {
        audio: document.getElementById("bgAudio"),
        cover: document.getElementById("coverArt"),
        coverWrap: document.getElementById("coverWrap"),
        title: document.getElementById("trackTitle"),
        musicToggle: document.getElementById("musicToggle"),
        gate: document.getElementById("enterGate"),
        enterBtn: document.getElementById("enterBtn")
      };

      let current = 0;
      let muted = true;
      let activated = false;

      function nextIndex() {
        return (current + 1) % playlist.length;
      }

      function setMute(next) {
        muted = next;
        ui.audio.muted = muted;
        ui.musicToggle.classList.toggle("is-muted", muted);
      }

      function applyCoverColor(img) {
        const c = document.createElement("canvas");
        const ctx = c.getContext("2d", { willReadFrequently: true });
        c.width = 24;
        c.height = 24;
        ctx.drawImage(img, 0, 0, 24, 24);
        const data = ctx.getImageData(0, 0, 24, 24).data;
        let r = 0;
        let g = 0;
        let b = 0;
        let count = 0;
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] < 20) continue;
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count += 1;
        }
        if (!count) return;
        r = Math.max(40, Math.min(230, Math.round(r / count)));
        g = Math.max(40, Math.min(230, Math.round(g / count)));
        b = Math.max(40, Math.min(230, Math.round(b / count)));
        document.documentElement.style.setProperty("--glow", `${r}, ${g}, ${b}`);
      }

      function animateCoverIn() {
        requestAnimationFrame(() => {
          ui.coverWrap.classList.remove("flip-out");
          ui.coverWrap.classList.add("flip-in");
          setTimeout(() => ui.coverWrap.classList.remove("flip-in"), 480);
        });
      }

      function setTrack(i) {
        current = i;
        const item = playlist[i];
        ui.title.textContent = item.title;
        ui.audio.src = item.audio;
        ui.coverWrap.classList.add("flip-out");

        const preload = new Image();
        preload.onload = () => {
          ui.cover.src = item.cover;
          applyCoverColor(preload);
          animateCoverIn();
        };
        preload.src = item.cover;
      }

      async function playNextSequential() {
        setTrack(nextIndex());
        await ui.audio.play().catch(() => {});
      }

      ui.audio.addEventListener("ended", () => {
        if (!activated) return;
        playNextSequential();
      });

      async function activatePlayback() {
        if (!activated) {
          activated = true;
          ui.gate.classList.add("hidden");
        }
        setMute(false);
        if (!ui.audio.paused) return;
        await ui.audio.play().catch(playNextSequential);
      }

      ui.enterBtn.addEventListener("click", activatePlayback);

      ui.musicToggle.addEventListener("click", async () => {
        if (!activated) {
          activated = true;
          ui.gate.classList.add("hidden");
        }
        setMute(!muted);
        if (!muted && ui.audio.paused) {
          await ui.audio.play().catch(() => {});
        }
      });

      setTrack(0);
      setMute(true);
    </script>
  </body>
</html>
